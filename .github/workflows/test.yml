name: Append test string

on:
  push:
    branches:
      - main

jobs:
  append:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Append test string to all .pyi files
        run: |
          for file in $(find . -name '*.pyi'); do
            echo "# test" >> "$file"
          done
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Append test string"
          git push